<!DOCTYPE html>
<html lang="en" class="bg-black h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robi — A personal log</title>
  <meta name="description" content="A robot I want to build, someday.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='28' fill='%236CA7FF'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { robi: '#6CA7FF' },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "cv11", "ss01"; }
    .dot-live {
      position: relative;
      display: inline-flex;
      width: 0.5rem;
      height: 0.5rem;
    }
    .dot-live::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: #6CA7FF;
      opacity: 0.6;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    .dot-live::after {
      content: '';
      position: relative;
      display: inline-flex;
      width: 100%;
      height: 100%;
      border-radius: 9999px;
      background: #6CA7FF;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2.2); opacity: 0; }
    }
  </style>
</head>
<body class="bg-black text-zinc-100 antialiased selection:bg-robi selection:text-black h-screen overflow-hidden">

  <!-- Top bar -->
  <nav class="fixed top-0 inset-x-0 z-20">
    <div class="max-w-4xl mx-auto px-6 md:px-10 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="dot-live"></span>
        <span class="font-mono text-[10px] uppercase tracking-[0.25em] text-zinc-300">Journal · Active</span>
      </div>
      <span class="font-mono text-[10px] uppercase tracking-[0.25em] text-zinc-500">2026 · 04.18</span>
    </div>
  </nav>

  <main class="h-full max-w-6xl mx-auto px-6 md:px-10 flex flex-col">

    <!-- Title near top, centered -->
    <h1 class="pt-40 md:pt-48 text-center text-7xl md:text-9xl font-medium tracking-[-0.045em] leading-none">Robi<span class="text-robi">.</span></h1>

    <!-- Stack, pushed up toward Robi. -->
    <section class="flex-1 flex flex-col justify-start pt-28">

      <div class="flex items-center justify-center gap-5 mb-16">
        <span class="h-px w-12 bg-robi"></span>
        <h2 class="font-mono text-lg uppercase tracking-[0.3em] text-robi font-black">Stack</h2>
        <span class="h-px w-12 bg-robi"></span>
      </div>

      <div class="space-y-14 max-w-5xl mx-auto w-full">

        <div class="flex items-center gap-10">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48">◆ Proficient</h3>
          <div class="flex flex-wrap gap-3">
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">Python</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">PyTorch</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">Isaac Gym</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">Isaac Lab</span>
          </div>
        </div>

        <div class="flex items-center gap-10">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48">◇ Familiar</h3>
          <div class="flex flex-wrap gap-3">
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">NVIDIA Warp</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">C++</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">PPO</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">Sim-to-Real</span>
            <span class="px-6 py-3.5 border border-zinc-800 rounded-full text-lg font-black text-zinc-100 hover:border-robi transition-colors">Domain Randomization</span>
          </div>
        </div>

        <div class="flex items-center gap-10">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48">○ Learning</h3>
          <div class="flex flex-wrap gap-3">
            <span class="px-6 py-3.5 border border-dashed border-zinc-800 rounded-full text-lg font-black text-zinc-300 hover:border-robi hover:text-zinc-100 transition-colors">SAC</span>
            <span class="px-6 py-3.5 border border-dashed border-zinc-800 rounded-full text-lg font-black text-zinc-300 hover:border-robi hover:text-zinc-100 transition-colors">Policy Gradient</span>
            <span class="px-6 py-3.5 border border-dashed border-zinc-800 rounded-full text-lg font-black text-zinc-300 hover:border-robi hover:text-zinc-100 transition-colors">DQN</span>
            <span class="px-6 py-3.5 border border-dashed border-zinc-800 rounded-full text-lg font-black text-zinc-300 hover:border-robi hover:text-zinc-100 transition-colors">Sim2Sim</span>
            <span class="px-6 py-3.5 border border-dashed border-zinc-800 rounded-full text-lg font-black text-zinc-300 hover:border-robi hover:text-zinc-100 transition-colors">Model-based RL</span>
          </div>
        </div>

      </div>
    </section>

    <!-- Bottom signature -->
    <footer class="py-6 text-center">
      <span class="font-mono text-[10px] uppercase tracking-[0.25em] text-zinc-700">Still building</span>
    </footer>

  </main>

</body>
</html>
