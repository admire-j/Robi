<!DOCTYPE html>
<html lang="en" class="bg-black h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robi — A personal log</title>
  <meta name="description" content="A robot I want to build, someday.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='28' fill='%236CA7FF'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { robi: '#6CA7FF' },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "cv11", "ss01"; }

    /* ---- Background decoration layers ---- */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 45%, black 40%, transparent 90%);
      -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 45%, black 40%, transparent 90%);
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(108,167,255,0.12) 0%, rgba(108,167,255,0.04) 35%, transparent 70%);
      filter: blur(40px);
      z-index: 0;
      animation: glow-pulse 8s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .bg-noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      z-index: 0;
    }

    /* ---- Corner ticks ---- */
    .corner {
      position: fixed;
      width: 28px;
      height: 28px;
      border-color: rgba(108,167,255,0.35);
      z-index: 20;
      pointer-events: none;
    }
    .corner.tl { top: 18px; left: 18px; border-top: 1px solid; border-left: 1px solid; }
    .corner.tr { top: 18px; right: 18px; border-top: 1px solid; border-right: 1px solid; }
    .corner.bl { bottom: 18px; left: 18px; border-bottom: 1px solid; border-left: 1px solid; }
    .corner.br { bottom: 18px; right: 18px; border-bottom: 1px solid; border-right: 1px solid; }

    /* ---- Live dot (kept) ---- */
    .dot-live {
      position: relative;
      display: inline-flex;
      width: 0.5rem;
      height: 0.5rem;
    }
    .dot-live::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: #6CA7FF;
      opacity: 0.6;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    .dot-live::after {
      content: '';
      position: relative;
      display: inline-flex;
      width: 100%;
      height: 100%;
      border-radius: 9999px;
      background: #6CA7FF;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2.2); opacity: 0; }
    }

    /* ---- STACK divider: subtle flowing shimmer ---- */
    .stack-line {
      position: relative;
      overflow: hidden;
      height: 1px;
      width: 3rem;
      background: rgba(108,167,255,0.35);
    }
    .stack-line::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, #6CA7FF, transparent);
      animation: shimmer 3.5s ease-in-out infinite;
    }
    .stack-line.right::after { animation-delay: 1.75s; }

    /* ---- admire-j heading: flowing shimmer ---- */
    .admire-j {
      position: relative;
      background: linear-gradient(90deg, #6CA7FF 0%, #6CA7FF 40%, #ffffff 50%, #6CA7FF 60%, #6CA7FF 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: admireShimmer 3.5s ease-in-out infinite;
    }
    @keyframes admireShimmer {
      0%   { background-position: 150% 0; }
      60%  { background-position: -50% 0; }
      100% { background-position: -50% 0; }
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      60%  { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    /* ---- Title: subtle blue aura behind Robi. ---- */
    .title-wrap {
      position: relative;
    }
    .title-wrap::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 220px;
      background: radial-gradient(ellipse at center, rgba(108,167,255,0.18), transparent 70%);
      filter: blur(30px);
      pointer-events: none;
      z-index: -1;
    }

    /* ---- Tag pill: refined hover ---- */
    .tag {
      position: relative;
      transition: border-color 0.25s ease, background-color 0.25s ease, transform 0.25s ease, color 0.25s ease;
    }
    .tag:hover {
      border-color: #6CA7FF;
      background-color: rgba(108,167,255,0.08);
      transform: translateY(-1px);
    }

    /* ---- Row marker (◆ ◇ ○) with small connector line ---- */
    .row-line {
      width: 24px;
      height: 1px;
      background: linear-gradient(to right, rgba(108,167,255,0.4), transparent);
      flex-shrink: 0;
    }

    /* ---- Entry animations ---- */
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rise { animation: rise 0.9s cubic-bezier(0.2,0.7,0.2,1) both; }
    .d-0  { animation-delay: 0.05s; }
    .d-1  { animation-delay: 0.25s; }
    .d-2  { animation-delay: 0.45s; }
    .d-3  { animation-delay: 0.6s;  }
    .d-4  { animation-delay: 0.75s; }
    .d-5  { animation-delay: 0.9s;  }
    .d-6  { animation-delay: 1.05s; }

    /* ---- Footer small accent ---- */
    .foot-line {
      display: inline-block;
      width: 20px;
      height: 1px;
      background: rgba(113,113,122,0.6);
      vertical-align: middle;
      margin: 0 10px;
    }

    /* ---- Tweakable Robi title ---- */
    #title-h1 {
      font-size: var(--robi-size, clamp(4.5rem, 12vw, 8rem));
      padding-top: var(--robi-top, 12rem);
      transform: translateX(var(--robi-x, 0px)) translateY(var(--robi-y, 0px));
      letter-spacing: var(--robi-tracking, -0.045em);
      transition: transform 0.25s ease, padding-top 0.25s ease, font-size 0.25s ease, letter-spacing 0.25s ease;
    }
    #title-h1 .robi-dot {
      color: var(--robi-dot-color, #6CA7FF);
    }

    /* ---- Tweakable Stack controls (vars consumed below) ---- */
    #stack-wrap {
      padding-top: var(--stack-top, 7rem);
      transform:
        translateX(var(--stack-x, 0px))
        translateY(var(--stack-y, 0px))
        scale(var(--stack-scale, 1));
      transform-origin: top center;
      transition: transform 0.25s ease, padding-top 0.25s ease;
    }
    #stack-rows > * + * {
      margin-top: var(--stack-row-gap, 3.5rem);
    }
    .tag {
      font-size: var(--tag-size, 1.125rem);
      padding: var(--tag-py, 0.875rem) var(--tag-px, 1.5rem);
    }

    /* ---- Tweaks panel ---- */
    #tweaks-panel {
      position: fixed;
      right: 18px;
      bottom: 60px;
      width: 280px;
      background: rgba(12, 12, 14, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(108,167,255,0.25);
      border-radius: 10px;
      padding: 16px;
      z-index: 50;
      display: none;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #e4e4e7;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.4);
    }
    #tweaks-panel.open { display: block; }
    #tweaks-panel h4 {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #6CA7FF;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #tweaks-panel h4 .reset-btn {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #71717a;
      cursor: pointer;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    #tweaks-panel h4 .reset-btn:hover { color: #e4e4e7; border-color: #6CA7FF; }
    .tweak-row {
      margin-bottom: 12px;
    }
    .tweak-row label {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 5px;
    }
    .tweak-row label span.val { color: #6CA7FF; }
    .tweak-row input[type="range"] {
      width: 100%;
      height: 3px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      outline: none;
    }
    .tweak-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6CA7FF;
      cursor: pointer;
      border: 2px solid #0c0c0e;
      box-shadow: 0 0 0 1px #6CA7FF;
    }
    .tweak-row input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6CA7FF;
      cursor: pointer;
      border: 2px solid #0c0c0e;
    }
    .tweak-row .seg {
      display: flex;
      gap: 4px;
    }
    .tweak-row .seg button {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #a1a1aa;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 0;
      border-radius: 4px;
      cursor: pointer;
    }
    .tweak-row .seg button.active {
      border-color: #6CA7FF;
      color: #6CA7FF;
      background: rgba(108,167,255,0.08);
    }
  </style>
</head>
<body class="bg-black text-zinc-100 antialiased selection:bg-robi selection:text-black h-screen overflow-hidden">

  <!-- Decoration layers -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>


  <!-- Top bar -->
  <nav class="fixed top-0 inset-x-0 z-20 rise d-0">
    <div class="max-w-4xl mx-auto px-6 md:px-10 py-6">
    </div>
  </nav>

  <main class="relative z-10 h-full max-w-6xl mx-auto px-6 md:px-10 flex flex-col">

    <!-- Title near top, centered -->
    <div class="title-wrap rise d-1">
      <h1 id="title-h1" class="text-center font-medium leading-none">Robi<span class="robi-dot">.</span></h1>
    </div>

    <!-- Stack, pushed up toward Robi. -->
    <section id="stack-wrap" class="flex-1 flex flex-col justify-start">

      <div class="flex items-center justify-center gap-5 mt-16 mb-10 rise d-2">
        <span class="stack-line"></span>
        <h2 class="admire-j font-mono text-lg text-robi font-black" style="font-family: system-ui; letter-spacing: 2px; font-size: 22px;">admire-j</h2>
        <span class="stack-line right"></span>
      </div>

      <div id="stack-rows" class="max-w-5xl mx-auto w-full">

        <div class="flex items-center gap-10 rise d-3">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48 flex items-center gap-3">
            <span>◆ Proficient</span>
          </h3>
          <span class="row-line"></span>
          <div class="flex flex-wrap gap-3">
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">Isaac Gym</span>
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">Isaac Lab</span>
          </div>
        </div>

        <div class="flex items-center gap-10 rise d-4">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48 flex items-center gap-3">
            <span>◇ Familiar</span>
          </h3>
          <span class="row-line"></span>
          <div class="flex flex-wrap gap-3">
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">NVIDIA Warp</span>
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">C++</span>
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">PPO</span>
            <span class="tag border border-zinc-800 rounded-full font-black text-zinc-100">Claude</span>
          </div>
        </div>

        <div class="flex items-center gap-10 rise d-5">
          <h3 class="font-mono text-base uppercase tracking-[0.25em] text-zinc-300 font-black shrink-0 w-48 flex items-center gap-3">
            <span>○ Learning</span>
          </h3>
          <span class="row-line"></span>
          <div class="flex flex-wrap gap-3">
            <span class="tag border border-dashed border-zinc-800 rounded-full font-black text-zinc-300">SAC</span>
            <span class="tag border border-dashed border-zinc-800 rounded-full font-black text-zinc-300">Sim2Real</span>
            <span class="tag border border-dashed border-zinc-800 rounded-full font-black text-zinc-300">Sim2Sim</span>
            <span class="tag border border-dashed border-zinc-800 rounded-full font-black text-zinc-300">Dreamer</span>
            <span class="tag border border-dashed border-zinc-800 rounded-full font-black text-zinc-300">VLA</span>
          </div>
        </div>

      </div>
    </section>

    <!-- Bottom signature -->
    <footer class="py-6 text-center rise d-6">
      <span class="font-mono text-[10px] uppercase tracking-[0.25em] text-zinc-700">
        <span class="foot-line"></span>Still building<span class="foot-line"></span>
      </span>
    </footer>

  </main>

  <!-- Tweaks panel -->
  <div id="tweaks-panel">
    <h4>
      <span>Tweaks</span>
      <button class="reset-btn" id="tweaks-reset">Reset</button>
    </h4>

    <div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#6CA7FF;margin:4px 0 10px;opacity:0.7;">— Robi —</div>

    <div class="tweak-row">
      <label>Title size <span class="val" id="v-rsize">128px</span></label>
      <input type="range" id="t-rsize" min="48" max="240" step="2">
    </div>
    <div class="tweak-row">
      <label>Title top <span class="val" id="v-rtop">192px</span></label>
      <input type="range" id="t-rtop" min="0" max="360" step="2">
    </div>
    <div class="tweak-row">
      <label>Title X <span class="val" id="v-rx">0px</span></label>
      <input type="range" id="t-rx" min="-200" max="200" step="1">
    </div>
    <div class="tweak-row">
      <label>Title Y <span class="val" id="v-ry">0px</span></label>
      <input type="range" id="t-ry" min="-120" max="200" step="1">
    </div>
    <div class="tweak-row">
      <label>Tracking <span class="val" id="v-rtrk">-0.045em</span></label>
      <input type="range" id="t-rtrk" min="-80" max="20" step="1">
    </div>
    <div class="tweak-row">
      <label>Dot color</label>
      <div class="seg" id="t-rdot">
        <button data-c="#6CA7FF" style="color:#6CA7FF">BLU</button>
        <button data-c="#ffffff" style="color:#fff">WHT</button>
        <button data-c="#F97316" style="color:#F97316">ORG</button>
        <button data-c="#10B981" style="color:#10B981">GRN</button>
      </div>
    </div>

    <div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#6CA7FF;margin:14px 0 10px;opacity:0.7;">— Stack —</div>

    <div class="tweak-row">
      <label>Scale <span class="val" id="v-scale">1.00</span></label>
      <input type="range" id="t-scale" min="0.6" max="1.4" step="0.01">
    </div>

    <div class="tweak-row">
      <label>Vertical offset <span class="val" id="v-y">0px</span></label>
      <input type="range" id="t-y" min="-200" max="200" step="1">
    </div>

    <div class="tweak-row">
      <label>Horizontal offset <span class="val" id="v-x">0px</span></label>
      <input type="range" id="t-x" min="-200" max="200" step="1">
    </div>

    <div class="tweak-row">
      <label>Top spacing <span class="val" id="v-top">112px</span></label>
      <input type="range" id="t-top" min="0" max="280" step="2">
    </div>

    <div class="tweak-row">
      <label>Row gap <span class="val" id="v-gap">56px</span></label>
      <input type="range" id="t-gap" min="16" max="120" step="2">
    </div>

    <div class="tweak-row">
      <label>Tag size</label>
      <div class="seg" id="t-size">
        <button data-size="sm" data-font="0.875" data-px="1.1" data-py="0.6">S</button>
        <button data-size="md" data-font="1"     data-px="1.3" data-py="0.75">M</button>
        <button data-size="lg" data-font="1.125" data-px="1.5" data-py="0.875">L</button>
        <button data-size="xl" data-font="1.25"  data-px="1.75" data-py="1">XL</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // Tweaks: Stack size & position
    // ============================================================
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "stackScale": 1.05,
      "stackY": 0,
      "stackX": 0,
      "stackTop": 96,
      "stackRowGap": 50,
      "tagSize": "lg",
      "robiSize": 200,
      "robiTop": 160,
      "robiX": 0,
      "robiY": 0,
      "robiTracking": -45,
      "robiDotColor": "#6CA7FF"
    }/*EDITMODE-END*/;

    const state = { ...TWEAK_DEFAULTS };
    const root = document.documentElement;
    const panel = document.getElementById('tweaks-panel');

    const sizeMap = {
      sm: { font: 0.875, px: 1.1,  py: 0.6   },
      md: { font: 1,     px: 1.3,  py: 0.75  },
      lg: { font: 1.125, px: 1.5,  py: 0.875 },
      xl: { font: 1.25,  px: 1.75, py: 1     },
    };

    function apply() {
      // Robi title
      root.style.setProperty('--robi-size', state.robiSize + 'px');
      root.style.setProperty('--robi-top', state.robiTop + 'px');
      root.style.setProperty('--robi-x', state.robiX + 'px');
      root.style.setProperty('--robi-y', state.robiY + 'px');
      root.style.setProperty('--robi-tracking', (state.robiTracking / 1000) + 'em');
      root.style.setProperty('--robi-dot-color', state.robiDotColor);

      // Stack
      root.style.setProperty('--stack-scale', state.stackScale);
      root.style.setProperty('--stack-y', state.stackY + 'px');
      root.style.setProperty('--stack-x', state.stackX + 'px');
      root.style.setProperty('--stack-top', state.stackTop + 'px');
      root.style.setProperty('--stack-row-gap', state.stackRowGap + 'px');
      const s = sizeMap[state.tagSize] || sizeMap.lg;
      root.style.setProperty('--tag-size', s.font + 'rem');
      root.style.setProperty('--tag-px', s.px + 'rem');
      root.style.setProperty('--tag-py', s.py + 'rem');

      // reflect in UI
      document.getElementById('t-scale').value = state.stackScale;
      document.getElementById('v-scale').textContent = Number(state.stackScale).toFixed(2);
      document.getElementById('t-y').value = state.stackY;
      document.getElementById('v-y').textContent = state.stackY + 'px';
      document.getElementById('t-x').value = state.stackX;
      document.getElementById('v-x').textContent = state.stackX + 'px';
      document.getElementById('t-top').value = state.stackTop;
      document.getElementById('v-top').textContent = state.stackTop + 'px';
      document.getElementById('t-gap').value = state.stackRowGap;
      document.getElementById('v-gap').textContent = state.stackRowGap + 'px';
      document.querySelectorAll('#t-size button').forEach(b => {
        b.classList.toggle('active', b.dataset.size === state.tagSize);
      });

      // Robi UI reflect
      document.getElementById('t-rsize').value = state.robiSize;
      document.getElementById('v-rsize').textContent = state.robiSize + 'px';
      document.getElementById('t-rtop').value = state.robiTop;
      document.getElementById('v-rtop').textContent = state.robiTop + 'px';
      document.getElementById('t-rx').value = state.robiX;
      document.getElementById('v-rx').textContent = state.robiX + 'px';
      document.getElementById('t-ry').value = state.robiY;
      document.getElementById('v-ry').textContent = state.robiY + 'px';
      document.getElementById('t-rtrk').value = state.robiTracking;
      document.getElementById('v-rtrk').textContent = (state.robiTracking / 1000).toFixed(3) + 'em';
      document.querySelectorAll('#t-rdot button').forEach(b => {
        b.classList.toggle('active', b.dataset.c.toLowerCase() === String(state.robiDotColor).toLowerCase());
      });
    }

    function persist(partial) {
      Object.assign(state, partial);
      apply();
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');
      } catch (e) {}
    }

    // wire up
    document.getElementById('t-scale').addEventListener('input', e => persist({ stackScale: parseFloat(e.target.value) }));
    document.getElementById('t-y').addEventListener('input',     e => persist({ stackY: parseInt(e.target.value, 10) }));
    document.getElementById('t-x').addEventListener('input',     e => persist({ stackX: parseInt(e.target.value, 10) }));
    document.getElementById('t-top').addEventListener('input',   e => persist({ stackTop: parseInt(e.target.value, 10) }));
    document.getElementById('t-gap').addEventListener('input',   e => persist({ stackRowGap: parseInt(e.target.value, 10) }));
    document.querySelectorAll('#t-size button').forEach(btn => {
      btn.addEventListener('click', () => persist({ tagSize: btn.dataset.size }));
    });
    document.getElementById('t-rsize').addEventListener('input', e => persist({ robiSize: parseInt(e.target.value, 10) }));
    document.getElementById('t-rtop').addEventListener('input',  e => persist({ robiTop: parseInt(e.target.value, 10) }));
    document.getElementById('t-rx').addEventListener('input',    e => persist({ robiX: parseInt(e.target.value, 10) }));
    document.getElementById('t-ry').addEventListener('input',    e => persist({ robiY: parseInt(e.target.value, 10) }));
    document.getElementById('t-rtrk').addEventListener('input',  e => persist({ robiTracking: parseInt(e.target.value, 10) }));
    document.querySelectorAll('#t-rdot button').forEach(btn => {
      btn.addEventListener('click', () => persist({ robiDotColor: btn.dataset.c }));
    });

    document.getElementById('tweaks-reset').addEventListener('click', () => {
      persist({
        stackScale: 1,
        stackY: 0,
        stackX: 0,
        stackTop: 112,
        stackRowGap: 56,
        tagSize: 'lg',
        robiSize: 128,
        robiTop: 192,
        robiX: 0,
        robiY: 0,
        robiTracking: -45,
        robiDotColor: '#6CA7FF'
      });
    });

    // initial apply
    apply();

    // edit-mode protocol
    window.addEventListener('message', (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode')   panel.classList.add('open');
      if (d.type === '__deactivate_edit_mode') panel.classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>

</body>
</html>
